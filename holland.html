<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStair | Holland 직업적성검사</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --mystair-navy: #0F172A;
            --mystair-navy-light: #1E293B;
            --mystair-indigo: #6366F1;
            --mystair-purple: #A855F7;
            --mystair-gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --mystair-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --border-color: #E2E8F0;
            --pill-bg: #F1F5F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--mystair-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MyStair Header Bar (Top Left Main Link Fixed) */
        .mystair-header {
            background-color: var(--mystair-navy);
            height: 72px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 40px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 왼쪽 상단 메인 이동 버튼 */
        .btn-header-main {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            margin-right: 8px;
        }

        .btn-header-main:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .mystair-logo {
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .hot-badge {
            background: var(--mystair-gradient);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .header-sub {
            color: #94A3B8;
            font-size: 14px;
            font-weight: 500;
            border-left: 1px solid #334155;
            padding-left: 16px;
        }

        /* Main Container */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card-container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(226, 232, 240, 0.8);
            padding: 40px;
            transition: all 0.3s ease;
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 20px 0;
        }

        .start-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .start-desc {
            color: var(--text-sub);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .info-pills {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .info-pill {
            background-color: var(--pill-bg);
            color: var(--mystair-navy);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--mystair-navy);
            color: #FFFFFF;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
            width: 100%;
            max-width: 300px;
        }

        .btn-primary:hover {
            background-color: var(--mystair-navy-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.2);
        }

        /* Quiz Screen */
        .quiz-screen {
            display: none;
        }

        .progress-section {
            margin-bottom: 32px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--mystair-navy);
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background-color: var(--pill-bg);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--mystair-gradient);
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .question-card {
            min-height: 110px;
            display: flex;
            align-items: center;
            margin-bottom: 28px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--mystair-navy);
            line-height: 1.5;
            word-break: keep-all;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 14px;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover {
            border-color: var(--mystair-indigo);
            background-color: #F8FAFC;
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--mystair-indigo);
            background-color: #EEF2FF;
            color: var(--mystair-indigo);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-prev {
            background: none;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-prev:hover:not(:disabled) {
            background-color: var(--pill-bg);
            color: var(--text-main);
        }

        .btn-prev:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Result Screen */
        .result-screen {
            display: none;
        }

        .result-header {
            text-align: center;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 2px dashed var(--border-color);
        }

        .result-tag {
            display: inline-block;
            background: var(--mystair-gradient);
            color: #FFFFFF;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .result-main-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 6px;
        }

        .result-sub-title {
            font-size: 15px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .score-bars {
            margin-bottom: 32px;
        }

        .score-bar-item {
            margin-bottom: 14px;
        }

        .score-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--mystair-navy);
        }

        .score-bar-track {
            height: 12px;
            background-color: var(--pill-bg);
            border-radius: 10px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: var(--mystair-indigo);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .detail-card {
            background-color: #F8FAFC;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .detail-card h3 {
            font-size: 17px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-card p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--mystair-navy);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-copy {
            width: 100%;
            background: var(--mystair-gradient);
            color: #FFFFFF;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }

        .btn-copy:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .btn-restart {
            width: 100%;
            background-color: var(--pill-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-restart:hover {
            background-color: var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--mystair-navy);
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 200;
        }

        @media (max-width: 640px) {
            .mystair-header {
                padding: 0 16px;
            }
            .header-sub {
                display: none;
            }
            .btn-header-main {
                padding: 8px 12px;
                font-size: 12px;
                margin-right: 4px;
            }
            .card-container {
                padding: 24px;
                border-radius: 20px;
            }
            .question-text {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<!-- Header (왼쪽 상단 메인 이동 버튼 고정) -->
<header class="mystair-header">
    <div class="header-left">
        <button class="btn-header-main" onclick="goToMain()">
            <i class="fa-solid fa-house"></i> 메인화면으로
        </button>
        <span class="mystair-logo" onclick="goToMain()">MyStair</span>
        <span class="hot-badge">Holland</span>
        <span class="header-sub">전국 마이스터고 맞춤형 직업적성검사</span>
    </div>
</header>

<!-- Main Wrapper -->
<div class="main-wrapper">
    <div class="card-container">
        
        <!-- 1. Start Screen -->
        <div id="start-screen" class="start-screen">
            <h1 class="start-title">Holland<br>직업적성검사</h1>
            <p class="start-desc">나의 흥미와 적성 유형(RIASEC)을 분석하여<br>나에게 꼭 맞는 직업군과 직무를 추천해 드립니다.</p>
            
            <div class="info-pills">
                <div class="info-pill">⏱ 소요시간 약 7분</div>
                <div class="info-pill">📝 총 60문항</div>
                <div class="info-pill">🎯 6가지 흥미 유형 진단</div>
            </div>

            <button class="btn-primary" onclick="startQuiz()">검사 시작하기</button>
        </div>

        <!-- 2. Quiz Screen -->
        <div id="quiz-screen" class="quiz-screen">
            <div class="progress-section">
                <div class="progress-info">
                    <span id="question-number">문항 1 / 60</span>
                    <span id="progress-percent" style="color: var(--mystair-indigo);">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="question-card">
                <div id="question-text" class="question-text">질문이 여기에 표시됩니다.</div>
            </div>

            <div class="options-group">
                <button class="option-btn" onclick="selectOption(1)">1. 전혀 그렇지 않다</button>
                <button class="option-btn" onclick="selectOption(2)">2. 그렇지 않은 편이다</button>
                <button class="option-btn" onclick="selectOption(3)">3. 보통이다</button>
                <button class="option-btn" onclick="selectOption(4)">4. 그런 편이다</button>
                <button class="option-btn" onclick="selectOption(5)">5. 매우 그렇다</button>
            </div>

            <div class="nav-buttons">
                <button id="btn-prev" class="btn-prev" onclick="prevQuestion()" disabled>← 이전 문항</button>
            </div>
        </div>

        <!-- 3. Result Screen -->
        <div id="result-screen" class="result-screen">
            <div class="result-header">
                <div class="result-tag">Holland 진로 진단 결과</div>
                <h2 id="result-holland-code" class="result-main-title">유형: -</h2>
                <p id="result-holland-alias" class="result-sub-title"></p>
            </div>

            <div class="score-bars" id="score-bars"></div>

            <div id="result-details"></div>

            <div class="action-group">
                <button class="btn-copy" onclick="copyResults()">📋 검사 결과 복사하기</button>
                <button class="btn-restart" onclick="restartQuiz()">🔄 다시 검사하기</button>
            </div>
        </div>

    </div>
</div>

<div id="toast" class="toast">결과가 클립보드에 복사되었습니다!</div>

<script>
    // 메인 사이트 URL
    const MAIN_URL = "https://mystair-kqbuqfgvmt4mtvr9zaaklf.streamlit.app/";

    // 최상위 창(Streamlit 메인 앱)으로 강제 이동하는 함수
    function goToMain() {
        window.top.location.href = MAIN_URL;
    }

    // 60 Holland Questions (10 for each code: R, I, A, S, E, C)
    const questions = [
        // R (실제형) 1-10
        { id: 1, type: "R", text: "1. 기계나 도구를 다루고 조작하는 활동이 즐겁다." },
        { id: 2, type: "R", text: "2. 손으로 직접 만들거나 수리하는 작업을 선호한다." },
        { id: 3, type: "R", text: "3. 야외나 현장에서 직접 몸을 움직이며 일하는 것이 좋다." },
        { id: 4, type: "R", text: "4. 전기, 전자 장비의 원리를 파악하고 점검하는 데 흥미가 있다." },
        { id: 5, type: "R", text: "5. 도면이나 기술 설계를 보고 실제 제품을 제작해보고 싶다." },
        { id: 6, type: "R", text: "6. 컴퓨터 부품이나 기계 장치를 조립하고 분해하는 것을 잘한다." },
        { id: 7, type: "R", text: "7. 눈으로 확인 가능한 실질적인 성과물을 만들어내는 일이 보람차다." },
        { id: 8, type: "R", text: "8. 자동차, 로봇, 공장 설비 등 기술적인 시스템에 관심이 많다." },
        { id: 9, type: "R", text: "9. 복잡한 이론보다는 직접 실험하고 체험하는 것이 더 잘 맞는다." },
        { id: 10, type: "R", text: "10. 안전 수칙을 준수하며 정밀한 작업을 완성해내는 편이다." },

        // I (탐구형) 11-20
        { id: 11, type: "I", text: "11. 과학적 원리나 복잡한 지식을 탐구하는 것이 재미있다." },
        { id: 12, type: "I", text: "12. 원인과 결과를 논리적으로 분석하여 문제를 해결하길 즐긴다." },
        { id: 13, type: "I", text: "13. 새로운 학문이나 전문 정보를 깊이 있게 연구하는 것을 좋아한다." },
        { id: 14, type: "I", text: "14. 데이터나 통계 자료를 분석하여 패턴을 찾아내는 편이다." },
        { id: 15, type: "I", text: "15. 관찰과 실험을 통해 가설을 검증하는 과정에 성취감을 느낀다." },
        { id: 16, type: "I", text: "16. 수학적, 상징적 개념을 활용하여 문제에 접근하는 편이다." },
        { id: 17, type: "I", text: "17. 질문이 생기면 정확한 답을 찾을 때까지 파고드는 습관이 있다." },
        { id: 18, type: "I", text: "18. 새로운 기술 트렌드나 연구 결과에 호기심이 많다." },
        { id: 19, type: "I", text: "19. 독립적으로 집중해서 학술적/기술적 문제를 해결하는 걸 좋아한다." },
        { id: 20, type: "I", text: "20. 비판적이고 객관적인 사고방식으로 상황을 바라본다." },

        // A (예술형) 21-30
        { id: 21, type: "A", text: "21. 그림, 디자인, 음악 등 창의적인 표현 활동을 좋아한다." },
        { id: 22, type: "A", text: "22. 규격화된 틀보다는 자신의 독창적인 아이디어를 살리는 일을 원한다." },
        { id: 23, type: "A", text: "23. 공간, 색상, 미적 감각을 발휘하는 일에 흥미가 있다." },
        { id: 24, type: "A", text: "24. 글쓰기, 영상 제작, 미디어 콘텐츠를 만드는 것이 즐겁다." },
        { id: 25, type: "A", text: "25. 자유로운 환경에서 상상력을 발휘하여 일하는 것을 선호한다." },
        { id: 26, type: "A", text: "26. 감수성이 풍부하며 사물의 아름다움을 잘 포착한다." },
        { id: 27, type: "A", text: "27. 남들과 똑같은 방식보다는 색다른 개성을 표현하는 편이다." },
        { id: 28, type: "A", text: "28. 사용자 경험(UX)이나 인터페이스(UI) 디자인에 관심이 있다." },
        { id: 29, type: "A", text: "29. 직관과 아이디어를 즉흥적으로 결합하여 새로운 것을 만들어낸다." },
        { id: 30, type: "A", text: "30. 정형화되지 않은 예술적 작업이나 크리에이티브 업무가 맞는다." },

        // S (사회형) 31-40
        { id: 31, type: "S", text: "31. 다른 사람을 돕고 봉사하거나 상담해주는 일에 보람을 느낀다." },
        { id: 32, type: "S", text: "32. 새로운 사람들과 쉽게 교류하고 유대감을 형성을 잘한다." },
        { id: 33, type: "S", text: "33. 누군가에게 지식이나 기술을 가르쳐주는 활동이 즐겁다." },
        { id: 34, type: "S", text: "34. 타인의 고민이나 감정에 깊이 공감하고 경청해준다." },
        { id: 35, type: "S", text: "35. 팀워크를 이루어 함께 목표를 달성하는 과정을 좋아한다." },
        { id: 36, type: "S", text: "36. 대화와 소통을 통해 갈등을 조율하고 해결하는 능력이 있다." },
        { id: 37, type: "S", text: "37. 도움이 필요한 사람들에게 구체적인 조언을 적극 제공한다." },
        { id: 38, type: "S", text: "38. 따뜻하고 화기애애한 조직 분위기를 만드는 데 기여한다." },
        { id: 39, type: "S", text: "39. 인간관계와 공동체의 안녕 및 성장에 대한 관심이 높다." },
        { id: 40, type: "S", text: "40. 타인을 서포트하고 육성하는 직무에서 만족감을 느낀다." },

        // E (기업형) 41-50
        { id: 41, type: "E", text: "41. 조직이나 프로젝트를 이끌며 리더십을 발휘하는 것을 좋아한다." },
        { id: 42, type: "E", text: "42. 목표를 달성하기 위해 사람들을 설득하고 영향력을 행사한다." },
        { id: 43, type: "E", text: "43. 새로운 사업 아이디어나 기획을 제안하고 추진하는 데 흥미가 있다." },
        { id: 44, type: "E", text: "44. 위험을 무릅쓰더라도 적극적인 도전을 즐기는 편이다." },
        { id: 45, type: "E", text: "45. 발표나 협상 상황에서 유창하고 논리적으로 말을 잘한다." },
        { id: 46, type: "E", text: "46. 성과 지향적이며 경쟁 상황에서 이기고자 하는 승부욕이 있다." },
        { id: 47, type: "E", text: "47. 자원과 인력을 효율적으로 관리하고 목표를 달성하도록 촉진한다." },
        { id: 48, type: "E", text: "48. 영업, 마케팅, 비즈니스 전략 분야에서 능력을 발휘하고 싶다." },
        { id: 49, type: "E", text: "49. 자신감이 넘치고 문제 해결 시 주도적으로 의견을 낸다." },
        { id: 50, type: "E", text: "50. 조직의 비전을 제시하고 구성원들의 동기를 부여하는 데 자신이 있다." },

        // C (관습형) 51-60
        { id: 51, type: "C", text: "51. 정해진 규칙과 원칙에 맞춰 체계적으로 일하는 것이 마음 편하다." },
        { id: 52, type: "C", text: "52. 자료, 문서, 데이터를 꼼꼼하게 정리하고 기록하는 일을 잘한다." },
        { id: 53, type: "C", text: "53. 예산, 숫자, 계산 관련 작업을 정확하게 수행해낸다." },
        { id: 54, type: "C", text: "54. 세부사항을 놓치지 않는 세심함과 정교함이 있다." },
        { id: 55, type: "C", text: "55. 매뉴얼과 절차를 충실히 준수하며 실수를 줄이려 노력한다." },
        { id: 56, type: "C", text: "56. 안정적이고 예측 가능한 조직 환경을 선호한다." },
        { id: 57, type: "C", text: "57. 일정 관리 및 체크리스트 점검을 철저히 하는 편이다." },
        { id: 58, type: "C", text: "58. 행정 업무나 품질 관리, 회계 작업 등에 적성이 맞는다." },
        { id: 59, type: "C", text: "59. 정보의 오류를 교정하고 정확도를 확보하는 일을 책임감 있게 수행한다." },
        { id: 60, type: "C", text: "60. 체계적인 데이터베이스 관리나 표준화 작업에 흥미가 있다." }
    ];

    // Holland Type Metadata
    const hollandMeta = {
        R: {
            name: "실제형 (Realistic)",
            alias: "현장주의 기술 전문가",
            desc: "도구와 기계를 잘 다루며, 솔직하고 실용적인 현장 중심 유형입니다.",
            jobs: ["기계 정비 엔지니어", "전기/설비 테크니션", "스마트팩토리 운용자", "CAD/CAM 설계자", "로봇 제어 기사"]
        },
        I: {
            name: "탐구형 (Investigative)",
            alias: "지적 탐구와 분석가",
            desc: "논리적이고 호기심이 많으며, 원리를 분석하고 문제를 연구하는 연구자 유형입니다.",
            jobs: ["SW 개발자", "데이터 분석가", "R&D 연구원", "AI/알고리즘 엔지니어", "반도체 연구원"]
        },
        A: {
            name: "예술형 (Artistic)",
            alias: "창의적 표현가",
            desc: "독창적이고 자유분방하며, 미적 감각과 감수성으로 새로움을 창조하는 크리에이터 유형입니다.",
            jobs: ["UI/UX 디자이너", "3D 그래픽 디자이너", "콘텐츠 기획자", "테크니컬 라이터", "영상 에디터"]
        },
        S: {
            name: "사회형 (Social)",
            alias: "따뜻한 조력자",
            desc: "타인을 돕고 소통하는 데 보람을 느끼며, 협력과 양육을 중시하는 파트너 유형입니다.",
            jobs: ["직업훈련 교사", "고객성공(CS) 매니저", "진로 상담사", "기업 교육담당자(HRD)", "안전관리자"]
        },
        E: {
            name: "기업형 (Enterprising)",
            alias: "도전적인 리더",
            desc: "목표를 위해 사람들을 이끌고 설득하며, 조직과 비즈니스를 개척하는 사업가 유형입니다.",
            jobs: ["프로젝트 매니저(PM)", "기술영업 전문가", "스타트업 창업가", "서비스 기획자", "생산관리 팀장"]
        },
        C: {
            name: "관습형 (Conventional)",
            alias: "체계적인 관리자",
            desc: "규칙과 원칙을 지키며, 정확한 데이터 정리 및 행정 관리에 유능한 수호자 유형입니다.",
            jobs: ["품질관리(QC) 엔지니어", "재무/회계 담당자", "네트워크/보안 관리자", "행정 사무원", "공정 관리자"]
        }
    };

    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion(0);
    }

    function showQuestion(index) {
        currentIndex = index;
        const q = questions[index];
        document.getElementById('question-number').innerText = `문항 ${index + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.text;

        const percent = Math.round(((index) / questions.length) * 100);
        document.getElementById('progress-percent').innerText = `${percent}%`;
        document.getElementById('progress-fill').style.width = `${percent}%`;

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, idx) => {
            if (answers[index] === idx + 1) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });

        document.getElementById('btn-prev').disabled = (index === 0);
    }

    function selectOption(value) {
        answers[currentIndex] = value;
        
        if (currentIndex < questions.length - 1) {
            setTimeout(() => {
                showQuestion(currentIndex + 1);
            }, 120);
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            showQuestion(currentIndex - 1);
        }
    }

    function calculateScores() {
        let scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
        
        answers.forEach((ans, idx) => {
            if (ans !== null) {
                const type = questions[idx].type;
                scores[type] += ans;
            }
        });

        let percentages = {};
        Object.keys(scores).forEach(type => {
            percentages[type] = Math.round(((scores[type] - 10) / 40) * 100);
        });

        let sorted = Object.keys(percentages).sort((a, b) => percentages[b] - percentages[a]);
        const topCode = sorted[0] + sorted[1];

        return {
            topCode,
            firstType: sorted[0],
            secondType: sorted[1],
            percentages
        };
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const result = calculateScores();
        const primaryMeta = hollandMeta[result.firstType];
        const secondaryMeta = hollandMeta[result.secondType];

        document.getElementById('result-holland-code').innerText = `유형: ${result.topCode}`;
        document.getElementById('result-holland-alias').innerText = `"${primaryMeta.alias} & ${secondaryMeta.alias}"`;

        const scoreBarsEl = document.getElementById('score-bars');
        scoreBarsEl.innerHTML = '';
        
        Object.keys(result.percentages).forEach(type => {
            const val = result.percentages[type];
            const meta = hollandMeta[type];
            const div = document.createElement('div');
            div.className = 'score-bar-item';
            div.innerHTML = `
                <div class="score-bar-label">
                    <span>${meta.name}</span>
                    <span>${val}% 적합도</span>
                </div>
                <div class="score-bar-track">
                    <div class="score-bar-fill" style="width: ${val}%;"></div>
                </div>
            `;
            scoreBarsEl.appendChild(div);
        });

        const detailEl = document.getElementById('result-details');
        const combinedJobs = Array.from(new Set([...primaryMeta.jobs, ...secondaryMeta.jobs]));

        detailEl.innerHTML = `
            <div class="detail-card">
                <h3>💡 1순위: ${primaryMeta.name}</h3>
                <p>${primaryMeta.desc}</p>
            </div>
            <div class="detail-card">
                <h3>💡 2순위: ${secondaryMeta.name}</h3>
                <p>${secondaryMeta.desc}</p>
            </div>
            <div class="detail-card">
                <h3>🎯 추천 맞춤 직무</h3>
                <div class="tag-group">
                    ${combinedJobs.map(job => `<span class="tag">${job}</span>`).join('')}
                </div>
            </div>
        `;
    }

    function copyResults() {
        const result = calculateScores();
        const primaryMeta = hollandMeta[result.firstType];
        const secondaryMeta = hollandMeta[result.secondaryType];
        const combinedJobs = Array.from(new Set([...primaryMeta.jobs, ...secondaryMeta.jobs]));

        let text = `[MyStair Holland 직업적성검사 결과]

`;
        text += `■ 주요 적성 코드: ${result.topCode}
`;
        text += `■ 대표 성향: ${primaryMeta.alias} & ${secondaryMeta.alias}

`;
        text += `■ 흥미 유형별 적합도:
`;
        Object.keys(result.percentages).forEach(type => {
            text += `- ${hollandMeta[type].name}: ${result.percentages[type]}%
`;
        });
        text += `
■ 추천 직무 분야:
`;
        text += `- ${combinedJobs.join(', ')}
`;

        navigator.clipboard.writeText(text).then(() => {
            showToast("검사 결과가 클립보드에 복사되었습니다!");
        }).catch(err => {
            console.error("복사 실패", err);
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }

    function restartQuiz() {
        currentIndex = 0;
        answers = new Array(questions.length).fill(null);
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }
</script>

</body>
</html>
