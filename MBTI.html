<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStair | 32가지 MBTI 진로 적성 검사</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --mystair-navy: #0F172A;
            --mystair-navy-light: #1E293B;
            --mystair-indigo: #6366F1;
            --mystair-indigo-hover: #4F46E5;
            --mystair-purple: #A855F7;
            --mystair-gradient: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --mystair-bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-sub: #64748B;
            --border-color: #E2E8F0;
            --pill-bg: #F1F5F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--mystair-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* MyStair Header Bar (Top Left Main Link) */
        .mystair-header {
            background-color: var(--mystair-navy);
            height: 72px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 40px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 왼쪽 상단 메인 이동 버튼 */
        .btn-header-main {
            background: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
            margin-right: 8px;
        }

        .btn-header-main:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        .mystair-logo {
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .hot-badge {
            background: var(--mystair-gradient);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .header-sub {
            color: #94A3B8;
            font-size: 14px;
            font-weight: 500;
            border-left: 1px solid #334155;
            padding-left: 16px;
        }

        /* Main Container */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card-container {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(226, 232, 240, 0.8);
            padding: 40px;
            transition: all 0.3s ease;
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 20px 0;
        }

        .start-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .start-desc {
            color: var(--text-sub);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .info-pills {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .info-pill {
            background-color: var(--pill-bg);
            color: var(--mystair-navy);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--mystair-navy);
            color: #FFFFFF;
            border: none;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
            width: 100%;
            max-width: 300px;
        }

        .btn-primary:hover {
            background-color: var(--mystair-navy-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.2);
        }

        /* Quiz Screen */
        .quiz-screen {
            display: none;
        }

        .progress-section {
            margin-bottom: 32px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--mystair-navy);
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background-color: var(--pill-bg);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--mystair-gradient);
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .question-card {
            min-height: 110px;
            display: flex;
            align-items: center;
            margin-bottom: 28px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--mystair-navy);
            line-height: 1.5;
            word-break: keep-all;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 14px;
            text-align: left;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-btn:hover {
            border-color: var(--mystair-indigo);
            background-color: #F8FAFC;
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--mystair-indigo);
            background-color: #EEF2FF;
            color: var(--mystair-indigo);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-prev {
            background: none;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 10px;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-prev:hover:not(:disabled) {
            background-color: var(--pill-bg);
            color: var(--text-main);
        }

        .btn-prev:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Result Screen */
        .result-screen {
            display: none;
        }

        .result-header {
            text-align: center;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 2px dashed var(--border-color);
        }

        .result-tag {
            display: inline-block;
            background: var(--mystair-gradient);
            color: #FFFFFF;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .result-main-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 6px;
        }

        .result-sub-title {
            font-size: 15px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .score-bars {
            margin-bottom: 32px;
        }

        .score-bar-item {
            margin-bottom: 14px;
        }

        .score-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--mystair-navy);
        }

        .score-bar-track {
            height: 12px;
            background-color: var(--pill-bg);
            border-radius: 10px;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: var(--mystair-indigo);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .detail-card {
            background-color: #F8FAFC;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .detail-card h3 {
            font-size: 17px;
            font-weight: 800;
            color: var(--mystair-navy);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-card p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            color: var(--mystair-navy);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-copy {
            width: 100%;
            background: var(--mystair-gradient);
            color: #FFFFFF;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }

        .btn-copy:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        .btn-restart {
            width: 100%;
            background-color: var(--pill-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-restart:hover {
            background-color: var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--mystair-navy);
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 200;
        }

        @media (max-width: 640px) {
            .mystair-header {
                padding: 0 16px;
            }
            .header-sub {
                display: none;
            }
            .btn-header-main {
                padding: 8px 12px;
                font-size: 12px;
                margin-right: 4px;
            }
            .card-container {
                padding: 24px;
                border-radius: 20px;
            }
            .question-text {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<header class="mystair-header">
    <div class="header-left">
        <button class="btn-header-main" onclick="goToMain()">🏠 메인화면으로</button>
        <span class="mystair-logo" onclick="goToMain()">MyStair</span>
        <span class="hot-badge">MBTI 32</span>
        <span class="header-sub">전국 마이스터고 맞춤형 MBTI 진로 적성 검사</span>
    </div>
</header>

<div class="main-wrapper">
    <div class="card-container">
        
        <div id="start-screen" class="start-screen">
            <h1 class="start-title">32가지 MBTI<br>진로 적성 검사</h1>
            <p class="start-desc">나의 성격 유형(E/I, S/N, T/F, J/P)과 자아 지표(A/T)를 정밀 분석하여<br>나에게 꼭 맞는 맞춤형 직무를 추천해 드립니다.</p>
            
            <div class="info-pills">
                <div class="info-pill">⏱ 소요시간 약 7분</div>
                <div class="info-pill">📝 총 60문항</div>
                <div class="info-pill">🎯 32가지 정밀 성격 분석</div>
            </div>

            <button class="btn-primary" onclick="startQuiz()">검사 시작하기</button>
        </div>

        <div id="quiz-screen" class="quiz-screen">
            <div class="progress-section">
                <div class="progress-info">
                    <span id="question-number">문항 1 / 60</span>
                    <span id="progress-percent" style="color: var(--mystair-indigo);">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="question-card">
                <div id="question-text" class="question-text">질문이 여기에 표시됩니다.</div>
            </div>

            <div class="options-group">
                <button class="option-btn" onclick="selectOption(1)">1. 전혀 그렇지 않다</button>
                <button class="option-btn" onclick="selectOption(2)">2. 그렇지 않은 편이다</button>
                <button class="option-btn" onclick="selectOption(3)">3. 보통이다</button>
                <button class="option-btn" onclick="selectOption(4)">4. 그런 편이다</button>
                <button class="option-btn" onclick="selectOption(5)">5. 매우 그렇다</button>
            </div>

            <div class="nav-buttons">
                <button id="btn-prev" class="btn-prev" onclick="prevQuestion()" disabled>← 이전 문항</button>
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <div class="result-header">
                <div class="result-tag">진로 적성 진단 결과</div>
                <h2 id="result-mbti-code" class="result-main-title">MBTI: -</h2>
                <p id="result-mbti-alias" class="result-sub-title"></p>
            </div>

            <div class="score-bars" id="score-bars"></div>

            <div id="result-details"></div>

            <div class="action-group">
                <button class="btn-copy" onclick="copyResults()">📋 검사 결과 복사하기</button>
                <button class="btn-restart" onclick="restartQuiz()">🔄 다시 검사하기</button>
            </div>
        </div>

    </div>
</div>

<div id="toast" class="toast">결과가 클립보드에 복사되었습니다!</div>

<script>
    const MAIN_URL = "https://mystair-kqbuqfgvmt4mtvr9zaaklf.streamlit.app/";

    // 60 Questions (12 for each dimension)
    const questions = [
        // E / I (1-12) -> High = E
        { id: 1, type: "EI", text: "1. 새로운 사람들과 쉽게 어울리고 먼저 말을 건네는 편이다." },
        { id: 2, type: "EI", text: "2. 여러 사람과 함께 프로젝트를 진행할 때 에너지가 생긴다." },
        { id: 3, type: "EI", text: "3. 자신의 생각이나 감정을 대화로 자유롭게 표현하는 것을 즐긴다." },
        { id: 4, type: "EI", text: "4. 혼자 머무르는 것보다 야외 활동이나 소셜 모임에 참여하는 것이 더 좋다." },
        { id: 5, type: "EI", text: "5. 처음 만난 사람과도 금방 공통된 관심사를 찾아 잘 어울린다." },
        { id: 6, type: "EI", text: "6. 많은 사람 앞에서 자신의 견해를 발표하는 것에 큰 부담이 없다." },
        { id: 7, type: "EI", text: "7. 조용한 분위기보다는 활기차고 북적이는 환경을 좋아한다." },
        { id: 8, type: "EI", text: "8. 관심사가 생기면 혼자 연구하기보다 여러 사람과 함께 토론한다." },
        { id: 9, type: "EI", text: "9. 주말이나 쉬는 날에 친구들을 만나 에너지를 충전하는 편이다." },
        { id: 10, type: "EI", text: "10. 생각한 바를 행동으로 빠르게 실행에 옮기는 경향이 있다." },
        { id: 11, type: "EI", text: "11. 폭넓은 대인관계를 형성하고 유지하는 것에 자신이 있다." },
        { id: 12, type: "EI", text: "12. 낯선 모임이나 행사장에 참석했을 때 즐거움을 느낀다." },

        // S / N (13-24) -> High = N
        { id: 13, type: "SN", text: "13. 눈앞의 실제 사실보다 미래의 가능성과 아이디어에 더 끌린다." },
        { id: 14, type: "SN", text: "14. 사물이나 사건 뒤에 숨겨진 의미와 패턴을 찾는 것을 즐긴다." },
        { id: 15, type: "SN", text: "15. 독창적이고 차별화된 새로운 아이디어를 생각해내는 능력이 뛰어나다." },
        { id: 16, type: "SN", text: "16. 디테일한 세부 사항보다는 전체적인 큰 그림을 보는 편이다." },
        { id: 17, type: "SN", text: "17. 이미 검증된 방식보다는 혁신적인 방식을 시도하길 선호한다." },
        { id: 18, type: "SN", text: "18. 비유, 비전, 직관적인 비유 표현을 자주 사용하는 편이다." },
        { id: 19, type: "SN", text: "19. 반복적인 작업보다 새로운 가능성을 탐구할 때 열정이 생긴다." },
        { id: 20, type: "SN", text: "20. '만약에 ~라면 어떨까?' 하는 상상을 자주 즐기는 편이다." },
        { id: 21, type: "SN", text: "21. 이론적이고 추상적인 개념을 이해하고 탐구하는 것이 재미있다." },
        { id: 22, type: "SN", text: "22. 현재의 현실적 여건보다는 미래의 비전과 청사진을 더 중시한다." },
        { id: 23, type: "SN", text: "23. 관습적인 기존 가이드라인에 의문을 품고 개선책을 제안한다." },
        { id: 24, type: "SN", text: "24. 직관이나 영감을 바탕으로 의사결정을 내리는 경우가 많다." },

        // T / F (25-36) -> High = T
        { id: 25, type: "TF", text: "25. 개인의 감정보다는 논리적이고 객관적인 사실에 근거하여 판단한다." },
        { id: 26, type: "TF", text: "26. 결정할 때 타인의 기분보다 공정성과 원칙을 지키는 것이 먼저다." },
        { id: 27, type: "TF", text: "27. 타인의 고민을 들으면 공감 표현보다는 객관적인 해결책을 제안한다." },
        { id: 28, type: "TF", text: "28. 비판이나 지적을 받았을 때 논리적으로 타당하다면 순순히 받아들인다." },
        { id: 29, type: "TF", text: "29. 상황을 인과관계에 따라 냉철하게 분석하는 것을 잘한다." },
        { id: 30, type: "TF", text: "30. 정서적 지지보다는 객관적이고 정확한 피드백이 더 유익하다고 생각한다." },
        { id: 31, type: "TF", text: "31. 갈등 상황에서 사정을 고려하기보다 규칙과 기준을 엄격하게 적용한다." },
        { id: 32, type: "TF", text: "32. 정답을 찾아내고 원리 원칙을 지키는 것에서 자부심을 느낀다." },
        { id: 33, type: "TF", text: "33. 감정적으로 행동하기보다 차분하고 이성적인 태도를 유지한다." },

    // Base 16 Metadata

            jobs: ["전기/설비 관리자", "품질관리(QC) 엔지니어", "회계/재무 담당자", "공정 관리자", "네트워크 엔지니어"]
        },

            jobs: ["공장장/생산관리자", "산업안전 기사", "프로젝트 관리자", "총무 팀장", "구매 담당자"]
        },
        ESFJ: {

            desc: "친절함과 협력적인 태도로 유연한 팀워크를 형성하고 사람들을 화합시키는 매개체입니다.",
            jobs: ["고객만족 매니저", "기업 교육담당자", "서비스 기획자", "원무/행정 관리자", "행사 기획자"]

            jobs: ["기계 정비 엔지니어", "스마트팩토리 운용자", "임베디드 개발자", "네트워크 테크니션", "설비 기사"]
        },
        ISFP: {

            jobs: ["UI/UX 디자이너", "3D 모델러", "영상 에디터", "제품 디자이너", "인테리어 디자이너"]
        },
        ESTP: {
            alias: "모험을 즐기는 사업가",
            desc: "순발력과 문제 해결 능력으로 현장의 위험을 원활히 대처하는 리스크 해결사입니다.",
            jobs: ["필드 엔지니어", "기술영업 전문가", "현장 관리자", "물류 매니저", "응급 대처 전문가"]
        },
        ESFP: {
            alias: "자유로운 영혼의 연예인",
            desc: "밝고 유쾌한 에너지로 조직에 활력을 불어넣고 현장 경험을 즐기는 에너자이저입니다.",
            jobs: ["이벤트 디렉터", "미디어 크리에이터", "영업 매니저", "고객 경험(CX) 기획자", "쇼호스트"]
        }
    };

    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);

    function goToMain() {
        window.location.href = MAIN_URL;
    }

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion(0);
    }

    function showQuestion(index) {
        currentIndex = index;
        const q = questions[index];
        document.getElementById('question-number').innerText = `문항 ${index + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.text;

        const percent = Math.round(((index) / questions.length) * 100);
        document.getElementById('progress-percent').innerText = `${percent}%`;
        document.getElementById('progress-fill').style.width = `${percent}%`;

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach((btn, idx) => {
            if (answers[index] === idx + 1) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });

        document.getElementById('btn-prev').disabled = (index === 0);
    }

    function selectOption(value) {
        answers[currentIndex] = value;
        
        if (currentIndex < questions.length - 1) {
            setTimeout(() => {
                showQuestion(currentIndex + 1);
            }, 120);
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            showQuestion(currentIndex - 1);
        }
    }

    function calculateScores() {
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0, AT: 0 };
        
        answers.forEach((ans, idx) => {
            if (ans !== null) {
                const type = questions[idx].type;
                scores[type] += ans;
            }
        });

        const eiRatio = Math.round(((scores.EI - 12) / 48) * 100);
        const snRatio = Math.round(((scores.SN - 12) / 48) * 100);
        const tfRatio = Math.round(((scores.TF - 12) / 48) * 100);
        const jpRatio = Math.round(((scores.JP - 12) / 48) * 100);
        const atRatio = Math.round(((scores.AT - 12) / 48) * 100);

        const typeE = eiRatio >= 50 ? 'E' : 'I';
        const typeN = snRatio >= 50 ? 'N' : 'S';
        const typeT = tfRatio >= 50 ? 'T' : 'F';
        const typeJ = jpRatio >= 50 ? 'J' : 'P';
        const typeA = atRatio >= 50 ? 'A' : 'T';

        const baseType = `${typeE}${typeN}${typeT}${typeJ}`;
        const fullType = `${baseType}-${typeA}`;

        return {
            fullType,
            baseType,
            typeA,
            ratios: {
                EI: { label: typeE === 'E' ? '외향형 (E)' : '내향형 (I)', val: typeE === 'E' ? eiRatio : 100 - eiRatio },
                SN: { label: typeN === 'N' ? '직관형 (N)' : '감각형 (S)', val: typeN === 'N' ? snRatio : 100 - snRatio },
                TF: { label: typeT === 'T' ? '사고형 (T)' : '감정형 (F)', val: typeT === 'T' ? tfRatio : 100 - tfRatio },
                JP: { label: typeJ === 'J' ? '판단형 (J)' : '인식형 (P)', val: typeJ === 'J' ? jpRatio : 100 - jpRatio },
                AT: { label: typeA === 'A' ? '자기확신형 (-A)' : '신중형 (-T)', val: typeA === 'A' ? atRatio : 100 - atRatio }
            }
        };
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        const result = calculateScores();
        const meta = mbtiMeta[result.baseType];

        document.getElementById('result-mbti-code').innerText = result.fullType;
        document.getElementById('result-mbti-alias').innerText = `"${meta.alias}"`;

        const scoreBarsEl = document.getElementById('score-bars');
        scoreBarsEl.innerHTML = '';
        
        Object.keys(result.ratios).forEach(key => {
            const item = result.ratios[key];
            const div = document.createElement('div');
            div.className = 'score-bar-item';
            div.innerHTML = `
                <div class="score-bar-label">
                    <span>${item.label}</span>
                    <span>${item.val}% 선호도</span>
                </div>
                <div class="score-bar-track">
                    <div class="score-bar-fill" style="width: ${item.val}%;"></div>
                </div>
            `;
            scoreBarsEl.appendChild(div);
        });

        const detailEl = document.getElementById('result-details');
        const identityText = result.typeA === 'A' 
            ? "<strong>자기확신형 (-A):</strong> 스트레스 저항력이 높으며 유연하고 자신감이 넘칩니다. 정서적으로 안정감이 느껴집니다."
            : "<strong>신중형 (-T):</strong> 성공 욕구가 강하고 자아 성찰적입니다. 섬세하고 신중한 완성도를 추구합니다.";

        detailEl.innerHTML = `
            <div class="detail-card">
                <h3>💡 성격 핵심 특성</h3>
                <p>${meta.desc}</p>
                <p style="margin-bottom:0;">${identityText}</p>
            </div>
            <div class="detail-card">
                <h3>🎯 추천 적성 직무 및 분야</h3>
                <div class="tag-group">
                    ${meta.jobs.map(job => `<span class="tag">${job}</span>`).join('')}
                </div>
            </div>
        `;
    }

    function copyResults() {
        const result = calculateScores();
        const meta = mbtiMeta[result.baseType];

        let text = `[MyStair 32가지 MBTI 진로 적성 검사 결과]\n\n`;
        text += `■ 성격 유형: ${result.fullType} (${meta.alias})\n`;
        text += `■ 핵심 특성: ${meta.desc}\n\n`;
        text += `■ 지표별 선호도 비율:\n`;
        Object.keys(result.ratios).forEach(k => {
            text += `- ${result.ratios[k].label}: ${result.ratios[k].val}%\n`;
        });
        text += `\n■ 추천 세부 직무:\n`;
        text += `- ${meta.jobs.join(', ')}\n`;

        navigator.clipboard.writeText(text).then(() => {
            showToast("검사 결과가 클립보드에 복사되었습니다!");
        }).catch(err => {
            console.error("복사 실패", err);
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }

    function restartQuiz() {
        currentIndex = 0;
        answers = new Array(questions.length).fill(null);
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }
</script>
